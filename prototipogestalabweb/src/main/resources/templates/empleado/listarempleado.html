<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
layout:decorate="~{/plantilla/plantilla}">

<head>
    <title>Lista de Empleados - GestaLab</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- Page Heading -->
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-users"></i> Empleados</h1>
            <a href="/empleado/nuevo" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                <i class="fas fa-plus fa-sm text-white-50"></i> Nuevo Empleado
            </a>
        </div>

        <!-- DataTales Example -->
        <div class="card shadow mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">Lista de Empleados</h6>
            </div>
            <div class="card-body">
                
                <!-- Search Bar -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="input-group">
                            <input type="text" id="searchInput" class="form-control" placeholder="Buscar empleado por nombre, email, cédula...">
                            <div class="input-group-append">
                                <button class="btn btn-outline-secondary" type="button" onclick="filterTable()">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover" id="dataTable" width="100%" cellspacing="0">
                        <thead class="bg-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Cédula</th>
                                <th>Correo</th>
                                <th>Área</th>
                                <th>Cargo</th>
                                <th>Usuario</th>
                                <th>Contraseña</th>
                                <th>Firma</th>
                                <th>Estado Firma</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="empleado : ${empleados}">
                                <td th:text="${empleado.idEmpleado}"></td>
                                <td th:text="${empleado.nombre}"></td>
                                <td th:text="${empleado.apellido}"></td>
                                <td th:text="${empleado.ci}"></td>
                                <td th:text="${empleado.correo}"></td>
                                <td th:text="${empleado.fkArea != null ? empleado.fkArea.nombre : '-'}"></td>
                                <td th:text="${empleado.fkCargo != null ? empleado.fkCargo.nombre : '-'}"></td>
                                <td th:text="${empleado.fkUsuario != null ? empleado.fkUsuario.nombre : '-'}"></td>
                                <td th:text="${empleado.fkUsuario != null ? empleado.fkUsuario.contrasenia : '-'}"></td>
                                <td th:text="${empleado.fkFirmaElectronica != null ? empleado.fkFirmaElectronica.formatoFirma : '-'}"></td>
                                <td>
                                    <span th:if="${empleado.fkFirmaElectronica != null and empleado.fkFirmaElectronica.fechaExpiracion != null and #dates.createNow().before(empleado.fkFirmaElectronica.fechaExpiracion)}"
                                          class="badge badge-success">Activa</span>
                                    <span th:unless="${empleado.fkFirmaElectronica != null and empleado.fkFirmaElectronica.fechaExpiracion != null and #dates.createNow().before(empleado.fkFirmaElectronica.fechaExpiracion)}"
                                          class="badge badge-danger">Inactiva</span>
                                </td>
                                <td>
                                    <span th:if="${empleado.estadoEmpleado}" class="badge badge-success">Activo</span>
                                    <span th:unless="${empleado.estadoEmpleado}" class="badge badge-danger">Inactivo</span>
                                </td>
                                <td>
                                    <a th:href="@{/empleado/editar/{id}(id=${empleado.idEmpleado})}" class="btn btn-sm btn-warning">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/empleado/eliminar/{id}(id=${empleado.idEmpleado})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Está seguro?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${#lists.isEmpty(empleados)}" class="alert alert-info">
                    <i class="fas fa-info-circle"></i> No hay empleados registrados
                </div>

            </div>
        </div>

    </div>

    <th:block th:fragment="scripts" layout:fragment="scripts">
        <script th:fragment="table-script" th:inline="javascript">
            $(document).ready(function() {
                $('#dataTable').DataTable({
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
                    },
                    columnDefs: [{
                    	orderable: false,
                        targets: 12
                    }]
                });
            });

            function filterTable() {
                const searchInput = document.getElementById('searchInput').value.toLowerCase();
                const rows = document.querySelectorAll('#dataTable tbody tr');
                let visibleCount = 0;
                
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    if (text.includes(searchInput)) {
                        row.style.display = '';
                        visibleCount++;
                    } else {
                        row.style.display = 'none';
                    }
                });
                
                if (visibleCount === 0 && searchInput.length > 0) {
                    alert('No se encontraron resultados');
                }
            }
            
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') filterTable();
            });
        </script>
    </th:block>

</body>

</html>
