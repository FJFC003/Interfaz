<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description"
	content="GestaLab - Sistema de Gestión de Laboratorio">
<meta name="author" content="">

<title>GestaLab - [[${pageTitle}]]</title>

<!-- Custom fonts for this template -->
<link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet"
	type="text/css">
<link
	href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
	rel="stylesheet">

<!-- Custom styles for this template -->
<link href="/css/sb-admin-2.min.css" rel="stylesheet">

<!-- Custom styles for DataTables -->
<link href="/vendor/datatables/dataTables.bootstrap4.min.css"
	rel="stylesheet">

</head>

<body id="page-top">

	<!-- Page Wrapper -->
	<div id="wrapper">

		<!-- Sidebar -->
		<ul
			class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion"
			id="accordionSidebar">

			<!-- Sidebar - Brand -->
			<a
				class="sidebar-brand d-flex align-items-center justify-content-center"
				href="/">
				<div class="sidebar-brand-icon rotate-n-15">
					<i class="fas fa-flask"></i>
				</div>
				<div class="sidebar-brand-text mx-3">GestaLab</div>
			</a>

			<!-- Divider -->
			<hr class="sidebar-divider my-0">

			<!-- Nav Item - Dashboard -->
			<li class="nav-item"><a class="nav-link" href="/"> <i
					class="fas fa-fw fa-tachometer-alt"></i> <span>Dashboard</span></a></li>

			<!-- Divider -->
			<hr class="sidebar-divider">

			<!-- Heading -->
			<div class="sidebar-heading">Gestión</div>

			<!-- Nav Item - Empleados -->
			<li class="nav-item"><a class="nav-link" href="/empleado/listar">
					<i class="fas fa-fw fa-users"></i> <span>Empleados</span>
			</a></li>

			<!-- Nav Item - Áreas -->
			<li class="nav-item"><a class="nav-link" href="/area/listar">
					<i class="fas fa-fw fa-building"></i> <span>Áreas</span>
			</a></li>

			<!-- Nav Item - Cargos -->
			<li class="nav-item"><a class="nav-link" href="/cargo/listar">
					<i class="fas fa-fw fa-briefcase"></i> <span>Cargos</span>
			</a></li>

			<!-- Nav Item - Roles -->
			<li class="nav-item"><a class="nav-link" href="/rol/listar">
					<i class="fas fa-fw fa-user-shield"></i> <span>Roles</span>
			</a></li>

			<!-- Divider -->
			<hr class="sidebar-divider d-none d-md-block">

			<!-- Sidebar Toggler (Sidebar) -->
			<div class="text-center d-none d-md-inline">
				<button class="rounded-circle border-0" id="sidebarToggle"></button>
			</div>

		</ul>
		<!-- End of Sidebar -->

		<!-- Content Wrapper -->
		<div id="content-wrapper" class="d-flex flex-column">

			<!-- Main Content -->
			<div id="content">

				<!-- Topbar -->
				<nav
					class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

					<!-- Sidebar Toggle (Topbar) -->
					<button id="sidebarToggleTop"
						class="btn btn-link d-md-none rounded-circle mr-3">
						<i class="fa fa-bars"></i>
					</button>

					<!-- Topbar Search -->
					<form
						class="d-none d-sm-inline-block form-inline mr-auto ml-md-3 my-2 my-md-0 mw-100 navbar-search">
						<div class="input-group">
							<input type="text" class="form-control bg-light border-0 small"
								placeholder="Buscar..." aria-label="Search"
								aria-describedby="basic-addon2">
							<div class="input-group-append">
								<button class="btn btn-primary" type="button">
									<i class="fas fa-search fa-sm"></i>
								</button>
							</div>
						</div>
					</form>

					<!-- Topbar Navbar -->
					<ul class="navbar-nav ml-auto">

						<!-- Nav Item - User Information -->
						<li class="nav-item dropdown no-arrow"><a
							class="nav-link dropdown-toggle" href="#" id="userDropdown"
							role="button" data-toggle="dropdown" aria-haspopup="true"
							aria-expanded="false"> <span
								class="mr-2 d-none d-lg-inline text-gray-600 small"
								th:text="${session.usuarioActual != null ? session.usuarioActual.nombre : 'Usuario'}">Usuario</span>
								<img class="img-profile rounded-circle"
								src="/img/undraw_profile.svg">
						</a>
							<div
								class="dropdown-menu dropdown-menu-right shadow animated--grow-in"
								aria-labelledby="userDropdown">
								<a class="dropdown-item" href="/logout"> <i
									class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
									Cerrar Sesión
								</a>
							</div></li>

					</ul>

				</nav>
				<!-- End of Topbar -->

				<!-- Begin Page Content -->
				<div class="container-fluid">

					<!-- Alert Messages -->
					<div th:if="${param.success}"
						class="alert alert-success alert-dismissible fade show"
						role="alert">
						<i class="fas fa-check-circle"></i> Operación realizada
						exitosamente
						<button type="button" class="close" data-dismiss="alert"
							aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<div th:if="${param.error}"
						class="alert alert-danger alert-dismissible fade show"
						role="alert">
						<i class="fas fa-exclamation-circle"></i> Error al procesar la
						solicitud
						<button type="button" class="close" data-dismiss="alert"
							aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<div th:if="${error}"
						class="alert alert-danger alert-dismissible fade show"
						role="alert">
						<i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
						<button type="button" class="close" data-dismiss="alert"
							aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<!-- Content -->
					<div layout:fragment="content"></div>

				</div>
				<!-- /.container-fluid -->

			</div>
			<!-- End of Main Content -->

			<!-- Footer -->
			<footer class="sticky-footer bg-white">
				<div class="container my-auto">
					<div class="copyright text-center my-auto">
						<span>GestaLab &copy; 2026 - Sistema de Gestión de
							Laboratorio</span>
					</div>
				</div>
			</footer>
			<!-- End of Footer -->

		</div>
		<!-- End of Content Wrapper -->

	</div>
	<!-- End of Page Wrapper -->

	<!-- Scroll to Top Button-->
	<a class="scroll-to-top rounded" href="#page-top"> <i
		class="fas fa-angle-up"></i>
	</a>

	<!-- Bootstrap core JavaScript-->
	<script src="/vendor/jquery/jquery.min.js"></script>
	<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

	<!-- Core plugin JavaScript-->
	<script src="/vendor/jquery-easing/jquery.easing.min.js"></script>

	<!-- Custom scripts for all pages-->
	<script src="/js/sb-admin-2.min.js"></script>

	<!-- Page level plugins -->
	<script src="/vendor/datatables/jquery.dataTables.min.js"></script>
	<script src="/vendor/datatables/dataTables.bootstrap4.min.js"></script>

	<!-- Page level custom scripts -->
	<script th:fragment="table-script">
		$(document)
				.ready(
						function() {
							$('#dataTable')
									.DataTable(
											{
												language : {
													url : '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json'
												}
											});
						});

		function filterTable() {
			const searchInput = document.getElementById('searchInput').value
					.toLowerCase();
			const table = document.getElementById('dataTable');
			const rows = table.getElementsByTagName('tbody')[0]
					.getElementsByTagName('tr');

			let visibleCount = 0;
			for (let i = 0; i < rows.length; i++) {
				const text = rows[i].textContent.toLowerCase();
				if (text.includes(searchInput)) {
					rows[i].style.display = '';
					visibleCount++;
				} else {
					rows[i].style.display = 'none';
				}
			}

			if (visibleCount === 0 && searchInput.length > 0) {
				alert('No se encontraron resultados');
			}
		}

		document.addEventListener('DOMContentLoaded', function() {
			const searchInput = document.getElementById('searchInput');
			if (searchInput) {
				searchInput.addEventListener('keypress', function(e) {
					if (e.key === 'Enter') {
						filterTable();
					}
				});
			}
		});
	</script>

</body>

</html>
